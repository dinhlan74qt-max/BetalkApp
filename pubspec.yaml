name: socialnetwork
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  connectivity_plus: ^7.0.0
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  flutter_svg: ^2.2.2
  flutter_dotenv: ^6.0.0
  mailer: ^6.6.0
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.2.0
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.9.1
  cloud_firestore: ^6.1.0
  file_picker: ^10.3.7
  video_player: ^2.10.1
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  record: ^6.1.2
  audioplayers: ^6.5.1
  photo_view: ^0.15.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0
  dio: ^5.9.0
  gal: ^2.3.2
  open_file: ^3.5.10
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  photo_manager: ^3.8.2
  just_audio: ^0.10.5
  app_links: ^6.3.1
  shimmer: ^3.0.0
  photo_manager_image_provider: ^2.2.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_screenutil: ^5.9.3
  pin_code_fields: ^8.0.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  fonts:
    - family: InstagramSans
      fonts:
        - asset: assets/fonts/Instagram Sans.ttf
          weight: 400
        - asset: assets/fonts/Instagram Sans Bold.ttf
          weight: 500
        - asset: assets/fonts/Instagram Sans Medium.ttf
          weight: 700
  uses-material-design: true
  assets:
    - assets/logos/betalk.png
    - assets/logos/logoUnicon.png
    - assets/svg/Union.svg
    - assets/icons/google.png
    - assets/icons/bottom/profileBottom.png
    - assets/icons/bottom/add.png
    - assets/icons/bottom/home.png
    - assets/icons/bottom/reels.png
    - assets/icons/bottom/search.png
    - assets/icons/bottom/clapper.png
    - assets/images/avtMacDinh.jpg
    - assets/images/earth.png
    - assets/data/songs.json
    - env/.env
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/betalk.png"
